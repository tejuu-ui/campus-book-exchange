<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZLZW5PD1Y8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-ZLZW5PD1Y8');
    </script>
    <meta charset="UTF-8">
    <title>Admin Dashboard | User Management</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body class="dashboard-body">
    <header class="dashboard-header">
        <h1>🛡️ Admin Control Panel</h1>
        <div class="header-right">
            <button onclick="logoutUser()" class="logout-btn">Sign Out</button>
        </div>
    </header>

    <div class="dashboard-container">
        <nav class="sidebar">
            <ul>
                <li><a href="#" class="active">👥 User Directory</a></li>
                <li><a href="/client-dashboard.html">🏠 Public Store</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="content-header">
                <h2>System Analytics</h2>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Accounts</h3>
                    <p class="stat-number" id="stat-total">0</p>
                </div>
                <div class="stat-card">
                    <h3>Registered Clients</h3>
                    <p class="stat-number" id="stat-clients">0</p>
                </div>
                <div class="stat-card">
                    <h3>Administrators</h3>
                    <p class="stat-number" id="stat-admins">0</p>
                </div>
            </div>

            <div class="actions-section">
                <h3>Registered Users</h3>
                <div style="overflow-x: auto; margin-top: 1rem;">
                    <table style="width: 100%; border-collapse: collapse; background: white;">
                        <thead>
                            <tr style="text-align: left; background: #f8fafc; border-bottom: 2px solid #edf2f7;">
                                <th style="padding: 1rem;">ID</th>
                                <th style="padding: 1rem;">Name</th>
                                <th style="padding: 1rem;">Email</th>
                                <th style="padding: 1rem;">Role</th>
                                <th style="padding: 1rem;">Created At</th>
                                <th style="padding: 1rem;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            <!-- Injected by script.js -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="actions-section" style="margin-top: 2rem;">
            <h3>💰 Book Sale Requests</h3>
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left;">
                    <thead>
                        <tr style="background: #f8fafc; border-bottom: 2px solid #edf2f7;">
                            <th style="padding: 1rem;">ID</th>
                            <th style="padding: 1rem;">Seller</th>
                            <th style="padding: 1rem;">Phone</th>
                            <th style="padding: 1rem;">Book Name</th>
                            <th style="padding: 1rem;">Price</th>
                            <th style="padding: 1rem;">Status</th>
                            <th style="padding: 1rem;">Date</th>
                            <th style="padding: 1rem;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="sell-requests-body">
                        <!-- Requests will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    </div>

    <script src="/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => loadUsersForAdmin());
    </script>
</body>
</html>
